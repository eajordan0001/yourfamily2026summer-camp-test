<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>優兒行動銀行 POS</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: sans-serif;
    text-align: center;
    margin: 0;
    background: #f4f4f4;
}

.container {
    padding: 15px;
}

#reader {
    width: 100%;
    min-height: 300px;
    background: black;
    border-radius: 10px;
}

/* 開始按鈕 */
#cam-btn {
    width: 100%;
    padding: 18px;
    font-size: 20px;
    background: #e6007e;
    color: white;
    border: none;
    margin-bottom: 10px;
}

input {
    width: 80%;
    font-size: 28px;
    text-align: center;
    padding: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
}

.btn {
    padding: 10px;
    font-weight: bold;
}

.main {
    width: 100%;
    padding: 15px;
    background: #28a745;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="container">

<h2>💰 優兒行動銀行 POS</h2>

<button id="cam-btn" onclick="startScanner()">
📷 開始連續掃描
</button>

<div id="reader"></div>

<div id="result" style="display:none;">

    <div id="name" style="font-size:22px;font-weight:bold;"></div>
    <div id="balance" style="font-size:30px;"></div>

    <input type="number" id="amount" value="0">

    <div class="grid">
        <button class="btn" onclick="adj(1)">+1</button>
        <button class="btn" onclick="adj(5)">+5</button>
        <button class="btn" onclick="adj(10)">+10</button>
        <button class="btn" onclick="adj(50)">+50</button>

        <button class="btn" onclick="adj(-1)">-1</button>
        <button class="btn" onclick="adj(-5)">-5</button>
        <button class="btn" onclick="adj(-10)">-10</button>
        <button class="btn" onclick="adj(-50)">-50</button>
    </div>

    <button class="main" onclick="doTrade()">手動交易</button>
</div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzI8YIKfK2h5MVeUOWE1oJq4mHu4KguUOVS_gt0wZdHvSz1AaDaOaE8jCD0rmz9q9SV/exec";
const TOKEN = "abc123";

let scanner;
let globalId = "";
let tid = "";

// 🔢 加減
function adj(v) {
    amount.value = (parseInt(amount.value) || 0) + v;
}

// 🔥 初始化 scanner（iPhone穩定關鍵）
async function startScanner() {

    document.getElementById("cam-btn").innerText = "開啟中...";

    try {

        if (scanner) {
            await scanner.stop().catch(()=>{});
            await scanner.clear().catch(()=>{});
        }

        scanner = new Html5Qrcode("reader");

        const config = {
            fps: 12,
            qrbox: 250,
            rememberLastUsedCamera: true
        };

        await scanner.start(
            { facingMode: "environment" },
            config,
            (text) => {

                // 🚀 立即鎖定，避免重複掃描
                if (globalId === text) return;

                globalId = text.trim();
                tid = "T" + Date.now();

                handleScan(globalId);

            }
        );

        document.getElementById("cam-btn").style.display = "none";

    } catch (err) {
        console.error(err);
        alert("鏡頭開啟失敗，請用 Safari/Chrome + HTTPS");
        document.getElementById("cam-btn").innerText = "📷 重新開啟";
    }
}

// 💳 核心：掃描後處理（連刷模式）
async function handleScan(id) {

    try {

        const url = `${scriptURL}?id=${id}&amount=0&token=${TOKEN}`;
        const res = await fetch(url);
        const data = await res.json();

        if (data.status === "success") {

            name.innerText = data.name;
            balance.innerText = data.balance;

            result.style.display = "block";

            // 🔁 悠遊卡模式：自動扣款（如果 amount != 0）
            let amt = parseInt(amount.value) || 0;

            if (amt !== 0) {
                await autoTrade(amt);
            }

        }

        // 🔁 不卡關鍵：掃完繼續掃
        restartScan();

    } catch (e) {
        console.log(e);
        restartScan();
    }
}

// 🔁 自動交易（悠遊卡模式）
async function autoTrade(amt) {

    let bal = parseInt(balance.innerText) || 0;

    if (amt < 0 && Math.abs(amt) > bal) {
        alert("餘額不足");
        return;
    }

    const url = `${scriptURL}?id=${globalId}&amount=${amt}&tid=${tid}&token=${TOKEN}`;

    const res = await fetch(url);
    const data = await res.json();

    if (data.status === "success") {

        if (navigator.vibrate) navigator.vibrate(100);

        const sound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
        sound.play();

        balance.innerText = data.newBalance;

    }
}

// 🔁 重新進入掃描（不卡 iPhone 關鍵）
async function restartScan() {

    try {
        await scanner.stop().catch(()=>{});
        await scanner.clear().catch(()=>{});

        setTimeout(() => {
            startScanner();
        }, 300);

    } catch (e) {
        console.log(e);
    }
}

// 💰 手動交易
async function doTrade() {
    let amt = parseInt(amount.value) || 0;
    if (amt === 0) return alert("請輸入金額");

    await autoTrade(amt);
    restartScan();
}

</script>

</body>
</html>
