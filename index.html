<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>優兒行動銀行系統</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: sans-serif;
    text-align: center;
    margin: 0;
    padding: 20px;
    background-color: #f4f4f4;
}
.container {
    background: white;
    padding: 20px;
    border-radius: 15px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
#reader {
    width: 100%;
    margin-bottom: 20px;
}
.info {
    margin: 15px 0;
}
.name {
    font-size: 24px;
    font-weight: bold;
    color: #e6007e;
}
.balance {
    font-size: 32px;
    font-weight: bold;
}
input {
    width: 80%;
    padding: 10px;
    font-size: 28px;
    text-align: center;
}
button {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">
<h2>💰 優兒行動銀行</h2>

<div id="reader"></div>

<div id="result" style="display:none;">
    <div class="info">
        <div class="name" id="name">---</div>
        <div class="balance" id="balance">---</div>
    </div>

    <input type="number" id="amount" value="0">

    <button id="ok-btn" onclick="doTrade()">確認加值/扣款</button>
    <button onclick="resetUI()">重新掃描</button>
</div>
</div>

<script>
// 🔗 你的後端
const scriptURL = "https://script.google.com/macros/s/AKfycbzI8YIKfK2h5MVeUOWE1oJq4mHu4KguUOVS_gt0wZdHvSz1AaDaOaE8jCD0rmz9q9SV/exec";

// 🔐 token（要跟後端一致）
const TOKEN = "abc123";

let scanner;
let globalId = "";
let tid = "";

// 🔊 音效（只建立一次）
const successSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

// 🎉 成功回饋
function playSuccessFeedback() {
    if (navigator.vibrate) navigator.vibrate(100);

    successSound.pause();
    successSound.currentTime = 0;
    successSound.play();
}

// ⏱ timeout 防卡死
function fetchWithTimeout(url, timeout = 5000) {
    return Promise.race([
        fetch(url),
        new Promise((_, reject) =>
            setTimeout(() => reject(new Error("timeout")), timeout)
        )
    ]);
}

// 🚀 啟動掃描
function startScan() {
    document.getElementById("result").style.display = "none";

    if (!scanner) scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (text) => {
            globalId = text.trim();
            tid = "T" + Date.now();

            scanner.stop();
            fetchData();
        }
    );
}

// 📥 讀取資料
async function fetchData() {
    try {
        const url = `${scriptURL}?id=${globalId}&amount=0&token=${TOKEN}`;
        const res = await fetchWithTimeout(url);
        const data = await res.json();

        if (data.status === "success") {
            document.getElementById("name").innerText = data.name;
            document.getElementById("balance").innerText = data.balance || data.newBalance;

            document.getElementById("result").style.display = "block";
        } else {
            alert(data.message);
        }

    } catch (e) {
        alert("讀取失敗（可能網路不穩）");
    }
}

// 💰 交易
async function doTrade() {
    const btn = document.getElementById("ok-btn");
    if (btn.disabled) return;

    let amt = parseInt(document.getElementById("amount").value) || 0;
    if (amt === 0) return alert("請輸入金額");

    let bal = parseInt(document.getElementById("balance").innerText) || 0;

    // 防扣到負數
    if (amt < 0 && Math.abs(amt) > bal) {
        return alert("餘額不足");
    }

    btn.disabled = true;
    btn.innerText = "處理中...";

    try {
        const url = `${scriptURL}?id=${globalId}&amount=${amt}&tid=${tid}&token=${TOKEN}`;
        const res = await fetchWithTimeout(url);
        const data = await res.json();

        if (data.status === "success") {

            // 🎉 成功效果
            playSuccessFeedback();

            alert(`✅ 完成\n${data.name}\n餘額：${data.newBalance}`);

            resetUI();

        } else {
            alert(data.message);
            resetBtn();
        }

    } catch (e) {
        alert("網路錯誤");
        resetBtn();
    }
}

// 🔄 重置按鈕
function resetBtn() {
    const btn = document.getElementById("ok-btn");
    btn.disabled = false;
    btn.innerText = "確認加值/扣款";
}

// 🔁 重置畫面
function resetUI() {
    resetBtn();
    startScan();
}

// ✨ UX：點擊清空 0
document.getElementById("amount").addEventListener("focus", function() {
    if (this.value == "0") this.value = "";
});

// 🚀 啟動
window.onload = startScan;

</script>
</body>
</html>
